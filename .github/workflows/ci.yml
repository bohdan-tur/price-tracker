name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "POSTGRES_USER=postgres" >> .env
          echo "POSTGRES_PASSWORD=postgres" >> .env
          echo "POSTGRES_DB=price_tracker_test" >> .env
          echo "DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/price_tracker_test" >> .env
          echo "SECRET_KEY=supersecretkey" >> .env
          echo "ACCESS_TOKEN_SECRET_KEY=test_access_key" >> .env
          echo "REFRESH_TOKEN_SECRET_KEY=test_refresh_key" >> .env

      - name: Build and start containers
        run: docker compose up -d --build

      - name: Wait for services to be ready
        run: sleep 10

      - name: Run Pytest
        run: docker compose exec -T -e PYTHONPATH=/app api python -m pytest app/tests

      - name: Stop containers
        if: always()
        run: docker compose down