services:

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  test_db:
    image: postgres:15-alpine
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${TEST_POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      - POSTGRES_USER=${TEST_POSTGRES_USER}
      - POSTGRES_PASSWORD=${TEST_POSTGRES_PASSWORD}
      - POSTGRES_DB=${TEST_POSTGRES_DB}
    ports:
      - "5434:5432"

  redis:
    image: redis:7-alpine
    container_name: price_tracker_redis
    restart: unless-stopped
    ports:
      - "6380:6379"

  api:
    build: .
    container_name: price_tracker_api
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TEST_POSTGRES_USER=${TEST_POSTGRES_USER}
      - TEST_POSTGRES_PASSWORD=${TEST_POSTGRES_PASSWORD}
      - TEST_POSTGRES_DB=${TEST_POSTGRES_DB}
      - TEST_DATABASE_URL=${TEST_DATABASE_URL}
      - ACCESS_TOKEN_SECRET_KEY=${ACCESS_TOKEN_SECRET_KEY}
      - REFRESH_TOKEN_SECRET_KEY=${REFRESH_TOKEN_SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD}
      - SEED_USER_PASSWORD=${SEED_USER_PASSWORD}
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      test_db:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build: .
    container_name: price_tracker_worker
    restart: unless-stopped
    command: celery -A app.backend.worker.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD}
      - SEED_USER_PASSWORD=${SEED_USER_PASSWORD}
    depends_on:
      - db
      - redis
      - api

  celery_beat:
    build: .
    container_name: price_tracker_beat
    restart: unless-stopped
    command: celery -A app.backend.worker.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD}
      - SEED_USER_PASSWORD=${SEED_USER_PASSWORD}
    depends_on:
      - db
      - redis
      - celery_worker

volumes:
  postgres_data: