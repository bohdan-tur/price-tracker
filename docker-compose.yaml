services:
  db:
    image: postgres:15-alpine
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: price_tracker_redis
    ports:
      - "6380:6379"

  api:
    build: .
    container_name: price_tracker_api
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TEST_POSTGRES_USER=${TEST_POSTGRES_USER}
      - TEST_POSTGRES_PASSWORD=${TEST_POSTGRES_PASSWORD}
      - TEST_POSTGRES_DB=${TEST_POSTGRES_DB}
      - TEST_DATABASE_URL=${TEST_DATABASE_URL}
      - ACCESS_TOKEN_SECRET_KEY=${ACCESS_TOKEN_SECRET_KEY}
      - REFRESH_TOKEN_SECRET_KEY=${REFRESH_TOKEN_SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started


  celery_worker:
    build: .
    container_name: price_tracker_worker
    command: celery -A app.backend.worker.celery_app worker --loglevel=info
    depends_on:
      - db
      - redis
      - api


  celery_beat:
    build: .
    container_name: price_tracker_beat
    command: celery -A app.backend.worker.celery_app beat --loglevel=info
    depends_on:
      - db
      - redis
      - celery_worker


volumes:
  postgres_data: